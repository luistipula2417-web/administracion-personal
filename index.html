<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0A0A0B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>KING · Sistema Pro</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --obsidian:#0A0A0B; --panel:#141416; --panel2:#1C1C20; --line:#27272C;
  --gold:#D4AF37; --gold-dim:#8A7B3F; --gold-soft:rgba(212,175,55,.12);
  --blue:#5B8DEF; --blue-soft:rgba(91,141,239,.12);
  --blood:#C8372D; --green:#3FA66A; --amber:#E0A02E;
  --ink:#EDEAE3; --muted:#8A8A90; --muted2:#5C5C63;
  --r:14px; --shadow:0 2px 14px rgba(0,0,0,.5);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--obsidian);color:var(--ink);
  font-family:Inter,system-ui,sans-serif;overscroll-behavior-y:none}
body{padding-bottom:env(safe-area-inset-bottom)}
.mono{font-family:'JetBrains Mono',monospace}
.gold{color:var(--gold)} .blue{color:var(--blue)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit}
a{color:var(--gold);text-decoration:none}

#app{max-width:560px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:84px}
.topbar{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,var(--obsidian) 60%,rgba(10,10,11,.92));
  backdrop-filter:blur(14px);padding:calc(env(safe-area-inset-top) + 14px) 20px 13px;
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;
  box-shadow:0 4px 20px rgba(0,0,0,.35)}
.brandmark{width:34px;height:34px;flex:0 0 auto}
.topbar h1{font-family:Cinzel;font-size:17px;margin:0;letter-spacing:.14em;font-weight:700}
.topbar .sub{font-size:10px;color:var(--gold-dim);letter-spacing:.22em;text-transform:uppercase;margin-top:2px}
.topbar .right{margin-left:auto;display:flex;gap:8px;align-items:center}
.dot{width:8px;height:8px;border-radius:50%}
.dot.on{background:var(--green);box-shadow:0 0 8px var(--green)}
.dot.off{background:var(--muted2)}
.iconbtn{width:38px;height:38px;border-radius:11px;background:var(--panel);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:17px}

.view{padding:18px 18px 10px;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.view h2{font-family:Cinzel;font-size:15px;letter-spacing:.1em;margin:4px 0 10px;display:flex;align-items:center;gap:8px}
.view h2 .ic{font-size:18px}
.subtitle{font-size:11.5px;color:var(--muted);margin:0 0 16px;line-height:1.6}
.eyebrow{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold-dim);margin:22px 0 10px;font-weight:700}

.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.kpi .lab{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600;line-height:1.3}
.kpi .val{font-family:'JetBrains Mono';font-size:20px;font-weight:700;margin-top:7px;letter-spacing:-.5px}
.kpi.calc{border-color:rgba(212,175,55,.2)}
.kpi.calc::after{content:"";position:absolute;inset:0;border:1px solid var(--gold-soft);border-radius:var(--r);pointer-events:none}
.kpi.calc .val{color:var(--gold)}
.kpi.neg .val{color:var(--blood)} .kpi.pos .val{color:var(--green)}

.rowcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:10px;
  display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)}
.rowcard:active{background:var(--panel2);border-color:rgba(212,175,55,.2)}
.rowcard .main{flex:1;min-width:0}
.rowcard .t1{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rowcard .t2{font-size:11.5px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rowcard .amt{font-family:'JetBrains Mono';font-weight:700;font-size:15px;text-align:right;white-space:nowrap}
.rowcard .amt.gold{color:var(--gold)}
.tag{display:inline-block;font-size:10px;font-weight:600;padding:2.5px 8px;border-radius:20px;letter-spacing:.03em}
.tag.ok{background:rgba(63,166,106,.15);color:var(--green)}
.tag.pend{background:rgba(224,160,46,.15);color:var(--amber)}
.tag.bad{background:rgba(200,55,45,.15);color:var(--blood)}
.tag.mut{background:var(--panel2);color:var(--muted)}

.addbtn{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(96px + env(safe-area-inset-bottom));
  z-index:40;background:var(--gold);color:#1a1407;font-weight:700;font-size:14px;padding:13px 24px;border-radius:30px;
  box-shadow:0 6px 28px rgba(212,175,55,.4),0 2px 8px rgba(0,0,0,.5);display:flex;align-items:center;gap:8px;letter-spacing:.04em}
.addbtn .p{font-size:18px;line-height:1}

.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;z-index:50;
  background:rgba(10,10,11,.95);backdrop-filter:blur(18px);border-top:1px solid var(--line);
  display:flex;justify-content:space-around;padding:9px 8px calc(9px + env(safe-area-inset-bottom))}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted2);font-size:9.5px;
  letter-spacing:.05em;padding:4px 2px;border-radius:10px}
.nav button .ic{font-size:19px}
.nav button.act{color:var(--gold)}
.nav button.act .ic{filter:drop-shadow(0 0 7px rgba(212,175,55,.55))}

.hub{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hub .mod{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;
  display:flex;flex-direction:column;gap:7px;min-height:92px;box-shadow:var(--shadow)}
.hub .mod:active{border-color:var(--gold-dim);box-shadow:0 0 0 1px var(--gold-dim)}
.hub .mod .ic{font-size:22px}
.hub .mod .nm{font-weight:700;font-size:13px}
.hub .mod .ds{font-size:10px;color:var(--muted);line-height:1.4}

.scrim{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:60;opacity:0;pointer-events:none;transition:.2s}
.scrim.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:50%;transform:translateX(-50%) translateY(100%);bottom:0;width:100%;max-width:560px;
  background:var(--panel);border-top-left-radius:22px;border-top-right-radius:22px;border:1px solid var(--line);
  border-bottom:none;z-index:61;transition:transform .26s cubic-bezier(.3,.9,.3,1);max-height:90vh;overflow-y:auto;
  padding:8px 20px calc(28px + env(safe-area-inset-bottom));box-shadow:0 -8px 40px rgba(0,0,0,.65)}
.sheet.show{transform:translateX(-50%) translateY(0)}
.sheet .grip{width:38px;height:4px;background:rgba(212,175,55,.3);border-radius:4px;margin:8px auto 16px}
.sheet h3{font-family:Cinzel;font-size:14px;letter-spacing:.1em;margin:0 0 16px;color:var(--gold-dim)}
.field{margin-bottom:15px}
.field label{display:block;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;font-weight:700}
.field input,.field select{width:100%;background:var(--obsidian);border:1px solid var(--line);border-radius:10px;
  color:var(--ink);padding:12px 14px;font-size:15px;outline:none}
.field input:focus,.field select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(91,141,239,.1)}
.field.calc input{color:var(--gold);font-family:'JetBrains Mono';font-weight:700;border-color:var(--gold-soft);
  background:var(--gold-soft);pointer-events:none;cursor:default;user-select:none;-webkit-user-select:none}
.field.blue input{color:var(--blue);border-color:rgba(91,141,239,.25);background:var(--blue-soft)}
.sheetbtns{display:flex;gap:11px;margin-top:10px}
.btn{flex:1;padding:14px;border-radius:12px;font-weight:700;font-size:14px;text-align:center}
.btn.pri{background:var(--gold);color:#1a1407;letter-spacing:.04em}
.btn.gho{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
.btn.del{background:rgba(200,55,45,.12);color:var(--blood);border:1px solid rgba(200,55,45,.3)}

.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:right;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold-dim);
  padding:9px 5px;border-bottom:1px solid var(--line);font-weight:700}
.tbl th:first-child,.tbl td:first-child{text-align:left}
.tbl td{padding:9px 5px;border-bottom:1px solid #1a1a1e;text-align:right;font-family:'JetBrains Mono';font-size:11px}
.tbl td:first-child{font-family:Inter;color:var(--ink);font-weight:500}
.tbl tr.tot td{border-top:1px solid var(--gold-dim);border-bottom:none;color:var(--gold);font-weight:700;padding-top:11px}

.bar{height:7px;background:var(--obsidian);border-radius:6px;overflow:hidden;border:1px solid var(--line)}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:6px}

.hwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:12px;background:var(--panel);box-shadow:var(--shadow)}
.hgrid{border-collapse:collapse;font-size:11px}
.hgrid th,.hgrid td{border:1px solid #1c1c20;text-align:center;min-width:24px;height:30px;padding:0}
.hgrid th{color:var(--muted2);font-weight:600;font-size:9px;position:sticky;top:0;background:var(--panel)}
.hgrid td.nm{text-align:left;padding:0 10px;min-width:140px;position:sticky;left:0;background:var(--panel);
  font-family:Inter;font-weight:500;color:var(--ink);white-space:nowrap;z-index:2}
.hgrid th.nm{position:sticky;left:0;z-index:3;text-align:left;padding-left:10px;min-width:140px}
.hcell{cursor:pointer}
.hcell.on{background:var(--gold);color:#1a1407;font-weight:700}
.hgrid td.pct{color:var(--gold);font-family:'JetBrains Mono';font-weight:700;min-width:40px}

.center{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 24px;text-align:center}
.center .seal{width:88px;height:88px;margin-bottom:20px}
.center h1{font-family:Cinzel;font-size:26px;letter-spacing:.18em;margin:0}
.center .slogan{color:var(--gold-dim);font-size:11px;letter-spacing:.24em;text-transform:uppercase;margin:8px 0 28px}
.center .field{width:100%;max-width:360px;text-align:left}
.center .btn{max-width:360px;width:100%;margin-top:6px}
.center .note{font-size:11.5px;color:var(--muted);margin-top:18px;max-width:340px;line-height:1.6}
.linkbtn{color:var(--gold-dim);font-size:12.5px;margin-top:16px;text-decoration:underline}
.muted{color:var(--muted)}
.empty{text-align:center;color:var(--muted2);font-size:13px;padding:40px 10px}
.toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--gold-dim);
  color:var(--ink);padding:11px 20px;border-radius:30px;font-size:13px;z-index:90;opacity:0;transition:.3s;pointer-events:none;
  box-shadow:0 4px 20px rgba(0,0,0,.6)}
.toast.show{opacity:1}
.quote{font-style:italic;color:var(--gold-dim);font-size:12.5px;text-align:center;padding:24px 20px;line-height:1.7}
.stamp{display:inline-block;border:2.5px solid;border-radius:8px;padding:5px 14px;font-family:Cinzel;font-weight:700;
  font-size:12px;letter-spacing:.12em;transform:rotate(-6deg)}
.stamp.ok{color:var(--green);border-color:var(--green)}

/* INICIO portada */
.portada{text-align:center;padding-top:8px}
.portada .seal{width:62px;height:62px;color:var(--gold)}
.portada .ttl{font-family:Cinzel;font-size:22px;letter-spacing:.16em;margin:14px 0 0}
.portada .ln{font-size:12px;color:var(--muted);margin-top:7px;line-height:1.5}
.portada .ln.gd{color:var(--gold-dim)}
.step{display:flex;gap:12px;align-items:flex-start;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:9px;text-align:left;box-shadow:var(--shadow)}
.step .n{font-family:Cinzel;color:var(--gold);font-weight:700;font-size:15px;min-width:20px}
.step .st{font-weight:600;font-size:13.5px}
.step .sd{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.5}
.step:active{border-color:var(--gold-dim)}

/* ===== FONDO IMAGEN + OVERLAY ===== */
html,body{background:var(--obsidian) url('bg-king.webp') center/cover fixed}
body::before{content:'';position:fixed;inset:0;background:rgba(0,0,0,.80);z-index:0;pointer-events:none}
#root{position:relative;z-index:1}

/* ===== GLASS PREMIUM ===== */
.card,.kpi,.rowcard,.hub .mod,.hwrap{backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.card{background:rgba(14,14,16,.78);border-color:rgba(212,175,55,.15);
  box-shadow:0 8px 32px rgba(0,0,0,.60),inset 0 1px 0 rgba(255,255,255,.04)}
.kpi{background:rgba(12,12,14,.80);box-shadow:0 6px 24px rgba(0,0,0,.55)}
.kpi.calc{border-color:rgba(212,175,55,.35);background:rgba(14,12,8,.82);
  box-shadow:0 6px 24px rgba(0,0,0,.55),0 0 0 1px rgba(212,175,55,.08) inset}
.kpi.calc .val{color:var(--gold);text-shadow:0 0 20px rgba(212,175,55,.28)}
.rowcard{background:rgba(14,14,16,.78);border-color:rgba(255,255,255,.07);
  box-shadow:0 4px 18px rgba(0,0,0,.50)}
.rowcard:active{background:rgba(20,20,24,.88);border-color:rgba(212,175,55,.30)}
.hub .mod{background:rgba(14,14,16,.80);border-color:rgba(212,175,55,.12)}
.hub .mod:active{border-color:rgba(212,175,55,.45);box-shadow:0 0 0 1px rgba(212,175,55,.20)}
.sheet{background:rgba(9,9,11,.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-color:rgba(212,175,55,.12)}
.topbar{background:rgba(5,5,7,.97);
  box-shadow:0 1px 0 rgba(212,175,55,.14),0 6px 24px rgba(0,0,0,.55)}
.nav{background:rgba(4,4,6,.97);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-color:rgba(212,175,55,.10)}
.toast{background:rgba(20,20,24,.94);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-color:rgba(212,175,55,.25)}
.hwrap{background:rgba(12,12,14,.80)}

/* ===== TIPOGRAFÍA Y ESCALA ===== */
.topbar h1{font-size:18px;letter-spacing:.22em;text-shadow:0 0 24px rgba(212,175,55,.18)}
.topbar .sub{letter-spacing:.30em;font-size:9.5px;color:var(--gold-dim)}
.view{padding:20px 18px 14px}
.eyebrow{margin:28px 0 12px;font-size:10px;letter-spacing:.28em;color:var(--gold-dim)}
.kpi .lab{letter-spacing:.16em;font-size:10px;font-weight:700}
.kpi .val{font-size:22px;margin-top:9px;letter-spacing:-.5px}
.grid2{gap:13px}.grid3{gap:10px}
.view h2{font-size:15px;letter-spacing:.13em;margin:2px 0 12px}
.card{padding:18px 20px}
.addbtn{box-shadow:0 8px 32px rgba(212,175,55,.45),0 2px 8px rgba(0,0,0,.6)}
.btn.pri{box-shadow:0 6px 24px rgba(212,175,55,.30),0 2px 6px rgba(0,0,0,.5)}

/* ===== PORTADA HERO ===== */
.portada-hero{position:relative;text-align:center;padding:36px 8px 30px;margin-bottom:22px;overflow:hidden}
.portada-hero::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(212,175,55,.10) 0%,transparent 70%);
  pointer-events:none}
.portada-hero::after{content:'';position:absolute;bottom:0;left:10%;right:10%;
  height:1px;background:linear-gradient(90deg,transparent,rgba(212,175,55,.25),transparent)}
.portada-hero .corona{width:84px;height:84px;color:var(--gold);display:block;margin:0 auto 20px;
  filter:drop-shadow(0 4px 16px rgba(212,175,55,.45))}
.portada-hero .titulo{font-family:Cinzel;font-size:28px;letter-spacing:.24em;color:var(--gold);
  margin:0 0 6px;text-shadow:0 2px 24px rgba(212,175,55,.30)}
.portada-hero .edicion{font-size:9px;letter-spacing:.38em;color:var(--gold-dim);
  text-transform:uppercase;margin-bottom:14px}
.portada-hero .sep{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:13px}
.portada-hero .sep i{flex:1;max-width:50px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,175,55,.30))}
.portada-hero .sep i:last-child{background:linear-gradient(90deg,rgba(212,175,55,.30),transparent)}
.portada-hero .sep .diam{width:5px;height:5px;background:var(--gold-dim);
  transform:rotate(45deg);flex-shrink:0}
.portada-hero .sub{font-size:11px;color:var(--muted);line-height:1.8;letter-spacing:.08em}

/* módulos portada */
.mod-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.mod-card{background:rgba(14,14,16,.80);border:1px solid rgba(212,175,55,.10);border-radius:14px;
  padding:16px 14px;cursor:pointer;transition:border-color .18s,box-shadow .18s;position:relative;overflow:hidden}
.mod-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,175,55,.18),transparent);pointer-events:none}
.mod-card:active{border-color:rgba(212,175,55,.35);
  box-shadow:0 4px 20px rgba(0,0,0,.50),0 0 0 1px rgba(212,175,55,.12) inset}
.mod-card .mic{font-size:24px;margin-bottom:11px}
.mod-card .mnm{font-weight:700;font-size:13px;color:var(--ink);letter-spacing:.02em}
.mod-card .mds{font-size:10px;color:var(--muted2);margin-top:4px;line-height:1.4}

/* frase final */
.portada-frase{background:rgba(212,175,55,.06);border:1px solid rgba(212,175,55,.14);
  border-radius:12px;padding:18px 20px;text-align:center;position:relative;overflow:hidden}
.portada-frase::before{content:'"';position:absolute;top:-8px;left:14px;
  font-family:Cinzel;font-size:60px;color:rgba(212,175,55,.08);line-height:1;pointer-events:none}
.portada-frase q{font-style:italic;color:var(--gold-dim);font-size:12.5px;line-height:1.8;quotes:none;
  position:relative}

/* ===== DINERO: ROJO=GASTO · VERDE=INGRESO · BLANCO=RESTO ===== */
.kpi.calc .val{color:var(--ink);text-shadow:none}
.kpi.pos .val,.kpi.calc.pos .val{color:var(--green)!important;text-shadow:none}
.kpi.neg .val,.kpi.calc.neg .val{color:var(--blood)!important;text-shadow:none}
.amt.pos{color:var(--green)} .amt.neg{color:var(--blood)} .amt.neu{color:var(--ink)}
.rowcard .amt.pos{color:var(--green)} .rowcard .amt.neg{color:var(--blood)}
.tbl td.pos{color:var(--green)} .tbl td.neg{color:var(--blood)}
.tbl tr.tot td{color:var(--ink)} .tbl td.gold{color:var(--ink)}
</style>
</head>
<body>
<div id="root"></div>

<svg style="display:none"><symbol id="seal" viewBox="0 0 100 100">
  <path fill="currentColor" d="M16 67 L11 32 L33 51 L50 26 L67 51 L89 32 L84 67 Z"/>
  <rect x="16" y="66" width="68" height="11" rx="2.5" fill="currentColor"/>
  <circle cx="50" cy="22" r="4.2" fill="currentColor"/>
  <circle cx="11" cy="29" r="3.6" fill="currentColor"/>
  <circle cx="89" cy="29" r="3.6" fill="currentColor"/>
  <circle cx="33" cy="72" r="2.4" fill="#0A0A0B"/>
  <circle cx="50" cy="72" r="2.4" fill="#0A0A0B"/>
  <circle cx="67" cy="72" r="2.4" fill="#0A0A0B"/>
</symbol></svg>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ====================== KING · Sistema Pro ======================
   Réplica fiel del Excel ADMINISTRACION_GENERAL · 16 hojas
   Azul = escribes · Dorado = se calcula solo

/* ====================== STORE ====================== */
const TABLES=['caccer','ventas','compras','movimientos','inventario','clientes','deudas_cobrar','deudas_pagar','holdeo','habitos','metas'];
const Store = {
  mode:'local', sb:null, user:null, db:{},
  async initLocal(){ this.mode='local'; this.db=LS.local||seed(); if(!this.db.settings)this.db.settings=seed().settings; if(!this.db.caccer)this.db.caccer=[]; LS.local=this.db; },
  async initCloud(url,key){ this.sb=supabase.createClient(url,key);
    const {data:{session}}=await this.sb.auth.getSession(); this.user=session?.user||null; this.mode='cloud'; },
  async signIn(email,pass){ const {error}=await this.sb.auth.signInWithPassword({email,password:pass}); if(error)throw error;
    this.user=(await this.sb.auth.getUser()).data.user; },
  async signUp(email,pass){ const {error}=await this.sb.auth.signUp({email,password:pass}); if(error)throw error; },
  async signOut(){ await this.sb.auth.signOut(); this.user=null; },
  async pull(){
    if(this.mode==='local'){ this.db=LS.local||seed(); if(!this.db.settings)this.db.settings=seed().settings; return; }
    this.db={};
    for(const t of TABLES){ const {data,error}=await this.sb.from(t).select('*').order('creado',{ascending:true});
      if(error)throw error; this.db[t]=data||[]; }
    const {data:st}=await this.sb.from('settings').select('*'); const s={}; (st||[]).forEach(r=>s[r.key]=r.value);
    this.db.settings={ presupuestoIngreso:s.presupuestoIngreso??2500, igvRate:s.igvRate??0.18 };
  },
  empty(){ return TABLES.every(t=>!(this.db[t]&&this.db[t].length)); },
  async seedCloud(){ const s=seed();
    for(const t of TABLES){ const rows=s[t].map(({id,...r})=>r); const {error}=await this.sb.from(t).insert(rows); if(error)throw error; }
    await this.setSetting('presupuestoIngreso',s.settings.presupuestoIngreso);
    await this.setSetting('igvRate',s.settings.igvRate); await this.pull(); },
  async save(table,row){
    if(this.mode==='local'){ const arr=this.db[table]; const i=arr.findIndex(x=>x.id===row.id);
      if(i>=0)arr[i]=row; else arr.push(row); LS.local=this.db; return row; }
    const {id,creado,user_id,...payload}=row;
    if(String(id||'').startsWith('id-')||!id){ const {data,error}=await this.sb.from(table).insert(payload).select().single(); if(error)throw error; return data; }
    const {data,error}=await this.sb.from(table).update(payload).eq('id',id).select().single(); if(error)throw error; return data;
  },
  async del(table,id){ if(this.mode==='local'){ this.db[table]=this.db[table].filter(x=>x.id!==id); LS.local=this.db; return; }
    const {error}=await this.sb.from(table).delete().eq('id',id); if(error)throw error; },
  async setSetting(key,value){ this.db.settings[key]=value; if(this.mode==='local'){ LS.local=this.db; return; }
    await this.sb.from('settings').upsert({key,value},{onConflict:'user_id,key'}); }
};

/* ====================== CÁLCULOS (fórmulas exactas del Excel) ====================== */
const Calc = {
  ventaTotal:v => (Number(v.cant)||0)*(Number(v.p_unit)||0)*(1-(Number(v.desc_pct)||0)/100),
  invMargen:i => i.p_venta? (i.p_venta-i.costo_u)/i.p_venta : 0,
  invValor:i => (Number(i.stock)||0)*(Number(i.costo_u)||0),
  invAlerta:i => (Number(i.stock)||0) <= (Number(i.stock_min)||0) ? '⚠ REPONER':'✓ OK',
  saldo:d => (Number(d.monto)||0)-(Number(d.abonado)||0),
  estadoCobrar:d => Calc.saldo(d)<=0?'✓ Cobrado':(d.vence&&d.vence<today()?'⚠ Vencido':'Pendiente'),
  estadoPagar:d => Calc.saldo(d)<=0?'✓ Pagado':(d.vence&&d.vence<today()?'⚠ Vencido':'Pendiente'),
  holdeoFalta:h => Math.max(0,(Number(h.meta)||0)-(Number(h.aportado)||0)),
  mesIdx:f => f? (new Date(f+'T00:00:00')).getMonth() : null,

  caccerTotalInv:db=>(db.caccer||[]).reduce((s,r)=>s+(+r.inversion||0),0),
  caccerTotalDev:db=>(db.caccer||[]).reduce((s,r)=>s+(+r.devolucion||0),0),
  caccerSaldo:db=>Calc.caccerTotalInv(db)-Calc.caccerTotalDev(db),
  ventasTotal:db => db.ventas.reduce((s,v)=>s+Calc.ventaTotal(v),0),
  gastosNegocio:db => db.compras.reduce((s,c)=>s+(+c.total||0),0),
  valorInv:db => db.inventario.reduce((s,i)=>s+Calc.invValor(i),0),
  movSum:(db,tipo)=>db.movimientos.filter(m=>m.tipo===tipo).reduce((s,m)=>s+(+m.monto||0),0),
  gastoPersCat:(db,cat)=>db.movimientos.filter(m=>m.tipo==='Gasto'&&m.categoria===cat).reduce((s,m)=>s+(+m.monto||0),0),
  gastoNegCat:(db,cat)=>db.compras.filter(c=>c.categoria===cat).reduce((s,c)=>s+(+c.total||0),0),
  presupReal:(db,clase)=>{const tipo=clase==='Ahorro'?'Ahorro':'Gasto';
    return db.movimientos.filter(m=>m.clase===clase&&m.tipo===tipo).reduce((s,m)=>s+(+m.monto||0),0);},
  habitPct:h => (h.dias||[]).filter(Boolean).length/31,
  habitosProm:db => db.habitos.length? db.habitos.reduce((s,h)=>s+Calc.habitPct(h),0)/db.habitos.length : 0,
  clienteTotal:(db,nombre)=>db.ventas.filter(v=>v.cliente===nombre).reduce((s,v)=>s+Calc.ventaTotal(v),0),
  clienteUltima:(db,nombre)=>{const fs=db.ventas.filter(v=>v.cliente===nombre&&v.fecha).map(v=>v.fecha).sort();
    return fs.length?fs[fs.length-1]:'';},
  metaActual:(db,m)=>{
    switch(m.fuente){
      case 'ahorro_total': return Calc.movSum(db,'Ahorro');
      case 'ventas_total': return Calc.ventasTotal(db);
      case 'habitos_prom': return Calc.habitosProm(db);
      case 'gastos_hormiga': return db.movimientos.filter(x=>x.categoria==='Gastos hormiga').reduce((s,x)=>s+(+x.monto||0),0);
      default: return Number(m.actual)||0;
    }
  },
  metaEstado:av => av>=1?'✓ LOGRADO':(av>=0.5?'En camino':'Iniciando'),

  meses(db){
    const a=Array.from({length:12},(_,i)=>({mes:monthName(i),ventas:0,compras:0,ing:0,gas:0,aho:0}));
    db.ventas.forEach(v=>{const m=Calc.mesIdx(v.fecha); if(m!=null)a[m].ventas+=Calc.ventaTotal(v)});
    db.compras.forEach(c=>{const m=Calc.mesIdx(c.fecha); if(m!=null)a[m].compras+=(+c.total||0)});
    db.movimientos.forEach(x=>{const m=Calc.mesIdx(x.fecha); if(m==null)return;
      if(x.tipo==='Ingreso')a[m].ing+=(+x.monto||0); if(x.tipo==='Gasto')a[m].gas+=(+x.monto||0); if(x.tipo==='Ahorro')a[m].aho+=(+x.monto||0);});
    return a;
  }
};

function openForm(table,row){
  const sc=SCHEMAS[table]; if(!sc)return;
  const isNew=!row; const data=row?{...row}:{id:uid()};
  if(isNew&&sc.fields.find(f=>f.k==='fecha'))data.fecha=today();
  if(isNew&&table==='metas')data.fuente='manual';
  if(isNew&&table==='holdeo')data.meta=900;
  document.querySelectorAll('.scrim,.sheet').forEach(e=>e.remove());
  const scrim=$('<div class="scrim"></div>'); const sheet=$('<div class="sheet"></div>');
  sheet.innerHTML=`<div class="grip"></div><h3>${isNew?'Nuevo':'Editar'} · ${sc.title}</h3>`;
  sc.fields.forEach(f=>{ const fd=$(`<div class="field ${f.t!=='select'&&f.t!=='date'?'blue':''}"></div>`); let inp;
    if(f.t==='select'){ inp=$(`<select></select>`); inp.innerHTML='<option value=""></option>'+f.o.map(o=>`<option ${data[f.k]===o?'selected':''}>${esc(o)}</option>`).join(''); }
    else { inp=$(`<input type="${f.t}">`); inp.value=data[f.k]??''; if(f.t==='number'){inp.step='any';inp.inputMode='decimal';} }
    inp.dataset.k=f.k; fd.innerHTML=`<label>${f.l}</label>`; fd.appendChild(inp); sheet.appendChild(fd); });
  if(table==='movimientos'){
    const tipoSel=sheet.querySelector('[data-k="tipo"]');
    const catSel=sheet.querySelector('[data-k="categoria"]');
    const updateCat=()=>{
      const tipo=tipoSel.value;
      const opts=tipo==='Ingreso'?CFG.catIng:tipo==='Gasto'?CFG.catGas:['Otros'];
      const cur=catSel.value;
      catSel.innerHTML='<option value=""></option>'+opts.map(o=>`<option${cur===o?' selected':''}>${esc(o)}</option>`).join('');
    };
    tipoSel.addEventListener('change',updateCat);
    updateCat();
  }
  let calcEl;
  if(sc.calc){ calcEl=$(`<div class="field calc"><label>${sc.calc(data)[0]}</label><input readonly tabindex="-1" value="${sc.calc(data)[1]}"></div>`); sheet.appendChild(calcEl); }
  const updCalc=()=>{ if(!sc.calc)return; const tmp={...data}; sheet.querySelectorAll('[data-k]').forEach(i=>tmp[i.dataset.k]=i.type==='number'?(+i.value||0):i.value);
    const [lab,val]=sc.calc(tmp); calcEl.querySelector('label').textContent=lab; calcEl.querySelector('input').value=val; };
  sheet.querySelectorAll('[data-k]').forEach(i=>i.addEventListener('input',updCalc));
  const btns=$(`<div class="sheetbtns"></div>`);
  const save=$(`<button class="btn pri">Guardar</button>`);
  save.onclick=async()=>{ sheet.querySelectorAll('[data-k]').forEach(i=>{ const f=sc.fields.find(x=>x.k===i.dataset.k); data[i.dataset.k]=f.t==='number'?(+i.value||0):i.value; });
    try{ await Store.save(table,data); await Store.pull(); close(); toast('Guardado'); render(); }catch(e){ toast('Error: '+(e.message||e)); } };
  btns.appendChild(save);
  if(!isNew){ const del=$(`<button class="btn del">Eliminar</button>`);
    del.onclick=async()=>{ if(!confirm('¿Eliminar este registro?'))return; try{ await Store.del(table,data.id); await Store.pull(); close(); toast('Eliminado'); render(); }catch(e){toast('Error: '+(e.message||e));} };
    btns.appendChild(del); }
  sheet.appendChild(btns);
  function close(){ scrim.classList.remove('show'); sheet.classList.remove('show'); setTimeout(()=>{scrim.remove();sheet.remove();},250); }
  scrim.onclick=close; document.body.append(scrim,sheet);
  requestAnimationFrame(()=>{scrim.classList.add('show');sheet.classList.add('show');});
}

/* ====================== BOOT ====================== */
(async function boot(){
  if ('serviceWorker' in navigator) {
    try {
      const reg = await navigator.serviceWorker.register('sw.js');
      // Cuando un nuevo SW toma el control, recarga UNA sola vez para mostrar la versión fresca
      let reloading = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!reloading) { reloading = true; location.reload(); }
      });
      // Si ya hay un SW en espera (p.ej. tab abierto durante el update), actívalo de inmediato
      const activateWaiting = sw => sw && sw.postMessage({ type: 'SKIP_WAITING' });
      if (reg.waiting) activateWaiting(reg.waiting);
      reg.addEventListener('updatefound', () => {
        const sw = reg.installing;
        sw.addEventListener('statechange', () => {
          if (sw.state === 'installed' && navigator.serviceWorker.controller) activateWaiting(sw);
        });
      });
    } catch {}
  }
  try {
    await Store.initCloud(SB_URL, SB_KEY);
    if(Store.user){ await Store.pull(); if(Store.empty()) await afterAuth(); else route('inicio'); return; }
  } catch(e) {}
  screenStart();
})();
</script>
</body>
